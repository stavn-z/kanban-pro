name: Backup Supabase (diário)

# Faz um backup do banco de dados todos os dias e guarda o arquivo criptografado
# como "artifact" da execução (seguro mesmo em repositório público).

on:
  schedule:
    - cron: '0 6 * * *'      # todo dia às 06:00 UTC (= 03:00 no horário de Brasília)
  workflow_dispatch:          # permite rodar manualmente pelo botão "Run workflow"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente PostgreSQL 17 (pg_dump)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Garante que a versão 17 seja a usada (o runner já vem com uma versão antiga instalada)
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Conferir versão do pg_dump
        run: pg_dump --version

      - name: Gerar e criptografar o backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          STAMP=$(date +%Y-%m-%d_%H-%M)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          # Dump apenas do schema public (suas tabelas: tasks, clients, responsibles, settings)
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges --schema=public -f "lumina_${STAMP}.sql"
          # Criptografa com AES256 usando a sua passphrase secreta
          gpg --batch --yes --passphrase "$BACKUP_PASSPHRASE" --cipher-algo AES256 -c "lumina_${STAMP}.sql"
          rm -f "lumina_${STAMP}.sql"

      - name: Enviar backup criptografado como artefato
        uses: actions/upload-artifact@v4
        with:
          name: lumina-backup-${{ env.STAMP }}
          path: "*.sql.gpg"
          retention-days: 90
